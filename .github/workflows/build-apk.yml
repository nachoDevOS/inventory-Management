name: Build APK

on:
  workflow_dispatch:   # Botón manual en GitHub
  push:
    branches: [master]  # También se activa con cada push a master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm install

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar NDK
        run: sdkmanager "ndk;27.1.12297006"

      - name: Generar proyecto nativo (prebuild)
        run: npx expo prebuild --platform android --clean --no-install

      - name: Dar permisos a gradlew
        run: chmod +x android/gradlew

      - name: Compilar APK debug
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
